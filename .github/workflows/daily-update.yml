name: Daily data update and deploy

on:
  schedule:
    # 15:00 UTC = 23:00 台灣時間，各遊戲晚間開獎並公布後
    - cron: "0 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root deps
        run: npm ci

      - name: Fetch latest lottery data
        run: npm run data

      - name: Regenerate bundled picks
        run: node scripts/gen-full-picks.js

      - name: Build frontend (root, no basePath)
        run: npx next build

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Deploy worker
        working-directory: server
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Commit refreshed data
        run: |
          git config user.name "808888-bot"
          git config user.email "bot@808888.tw"
          git add data/raw public/data server/src/data/full-picks.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: daily data refresh [skip ci]"
            git push
          fi
